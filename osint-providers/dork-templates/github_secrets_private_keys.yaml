platform_dorks:
  github:
  - '"BEGIN RSA PRIVATE KEY"'
  - '"BEGIN OPENSSH PRIVATE KEY"'
  - '"BEGIN DSA PRIVATE KEY"'
  - '"BEGIN EC PRIVATE KEY"'
  - '"-----BEGIN PRIVATE KEY-----"'
  - filename:id_rsa OR filename:id_dsa OR filename:id_ecdsa
  - extension:pem OR extension:key (PRIVATE OR SECRET)
