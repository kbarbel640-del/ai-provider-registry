platform_dorks:
  github:
  - AIza[0-9A-Za-z\-_]{35}
  - sk_live_[0-9a-zA-Z]{24}
  - pk_live_
  - xox[baprs]-[0-9a-zA-Z]{10,}
  - sk-[a-zA-Z0-9]{20,50}
  - '"Authorization: Bearer" extension:js OR extension:py'
  - org:TARGETCOMPANY (AIza OR sk_live_ OR xox)
