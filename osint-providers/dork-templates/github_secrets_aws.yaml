id: github_secrets_aws
name: GitHub Secret Hunting - AWS Credentials
description: Suche nach AWS Access Keys und Secrets auf GitHub
category: code_repos
severity: critical
risk: critical
tags:
- github
- aws
- credentials
- api_keys
- secrets
platform_dorks:
  github:
  - AKIA[0-9A-Z]{16}
  - '"aws_access_key_id" OR "AWS_ACCESS_KEY_ID"'
  - '"AWS_SECRET_ACCESS_KEY" OR "aws_secret_access_key"'
  - filename:credentials aws
  - org:TARGETCOMPANY AKIA
