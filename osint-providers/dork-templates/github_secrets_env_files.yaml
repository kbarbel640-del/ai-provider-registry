id: github_secrets_env_files
name: GitHub Secret Hunting - Environment Files
description: Suche nach Secrets in .env und Config-Dateien auf GitHub
category: code_repos
severity: critical
risk: critical
tags:
- github
- secrets
- env
- configuration
- credentials
platform_dorks:
  github:
  - filename:.env (password OR secret OR key OR token OR AKIA OR AIza OR ghp_ OR sk_live_)
  - filename:.env DB_PASSWORD OR DATABASE_URL OR SECRET_KEY
  - extension:env OR extension:yaml OR extension:json (api_key OR secret OR password)
  - filename:config.json OR filename:settings.py "password"
  - path:.github "AWS_SECRET_ACCESS_KEY" OR "GITHUB_TOKEN"
  - filename:.git-credentials OR filename:.netrc password
  - org:TARGETCOMPANY (AKIA OR ghp_ OR "BEGIN RSA PRIVATE KEY" OR filename:.env)
