id: github_secrets_jwt
name: GitHub Secret Hunting - JWT Tokens
description: Suche nach JWT Tokens in Code und Config-Dateien
category: code_repos
severity: high
risk: high
tags:
- github
- jwt
- tokens
- authentication
- secrets
platform_dorks:
  github:
  - eyJ[a-zA-Z0-9_-]{10,}\.eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}
  - '"eyJ" extension:json OR extension:txt'
  - '"Authorization: Bearer eyJ"'
  - filename:.env JWT_ OR ACCESS_TOKEN_
