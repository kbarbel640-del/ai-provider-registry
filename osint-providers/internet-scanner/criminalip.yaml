id: criminalip
name: CriminalIP
url: https://www.criminalip.io
api_base: https://api.criminalip.io/v2
api_type: REST
auth_type: 'api_key (Header: x-api-key)'
env_var: CRIMINALIP_API_KEY
rate_limit: 100 req/day (Free)
free_tier: true
priority: 2
category:
- internet_scanner
- dork_search
description: Koreanischer Allround-Scanner mit guter Dork-Syntax
typical_queries:
- 'search: /search?query={query}'
- 'ip_lookup: /ip/{ip}'
dork_syntax: 'port:2375

  product:Docker

  country:DE

  title:"Welcome to nginx"

  '
dork_fields:
- port
- product
- country
- title
- protocol
- cert.issuer
_category: internet-scanner
_category_label: Internet Scanner / Attack Surface
