name: Z.ai (Zhipu AI)
api_style: openai
auth:
  type: bearer
  header: Authorization
  prefix: "Bearer "
  env_var: ZAI_API_KEY
  doc_url: https://z.ai/manage-apikey/apikey-list
pricing:
  free: true
  pay_as_you_go: true
  doc_url: https://docs.z.ai/guides/overview/pricing
supports:
  - chat
  - vision
  - image
  - video
  - audio
  - tools
  - streaming
  - json_mode
  - reasoning
  - web_search
endpoint: https://api.z.ai/api/paas/v4
api_spec: https://docs.z.ai/openapi.json
notes:
  coding_plan_endpoint: https://api.z.ai/api/coding/paas/v4   # OpenAI protocol
  anthropic_protocol_endpoint: https://api.z.ai/api/anthropic  # drop-in for Claude SDK
  auth_alternative: JWT (HS256, id.secret key format) for higher-security scenarios
  rate_limits_doc: https://z.ai/manage-apikey/rate-limits      # account-tier dependent, behind login
  free_models: [glm-4.7-flash, glm-4.5-flash, glm-4.6v-flash]
  env_var_alternative: ZHIPU_API_KEY (used by models.dev / ai-sdk npm)
  source: Kontextfenster + Pricing autoritativ abgegichen gegen models.dev/api.json (Z.ai)
# ---------------------------------------------------------------------------
# Text models (chat/reasoning). Per-1M-token pricing unless `free`.
# ---------------------------------------------------------------------------
models:
  # --- Flagship / long context ---
  - id: glm-5.2
    name: GLM-5.2
    description: Open flagship GLM for long-horizon coding agents and million-token context work
    context_window: 1000000
    output_limit: 131072
    pricing: { input: 1.40, cached_read: 0.26, output: 4.40 }
    structured_output: true
    open_weights: true
    release_date: 2026-06-13
    tags: [flagship, reasoning, coding, long_context]
    reasoning_effort: [max, xhigh, high, medium, low, minimal, none]
  - id: glm-5.1
    name: GLM-5.1
    description: Strong GLM coding model for agentic engineering, terminals, and repository generation
    context_window: 200000
    output_limit: 131072
    pricing: { input: 1.40, cached_read: 0.26, output: 4.40 }
    structured_output: true
    open_weights: true
    release_date: 2026-04-07
    tags: [reasoning, coding]
  - id: glm-5-turbo
    name: GLM-5-Turbo
    description: Faster GLM-5 lane for coding agents that need lower latency
    context_window: 200000
    output_limit: 131072
    pricing: { input: 1.20, cached_read: 0.24, output: 4.00 }
    structured_output: true
    open_weights: false
    release_date: 2026-03-16
    tags: [reasoning, fast]
  - id: glm-5
    name: GLM-5
    description: General GLM flagship for coding, analysis, and tool-heavy engineering workflows
    context_window: 204800
    output_limit: 131072
    pricing: { input: 1.00, cached_read: 0.20, output: 3.20 }
    open_weights: true
