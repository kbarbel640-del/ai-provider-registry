name: Hugging Face
api_style: openai
auth:
  type: bearer
  header: Authorization
  prefix: "Bearer "
  env_var: HF_TOKEN
  doc_url: https://huggingface.co/settings/tokens
pricing:
  free: true
  pay_as_you_go: true
  monthly_credit_free: 0.10            # USD/month for free users, subject to change
  monthly_credit_pro: 2.00             # USD/month for PRO users
  monthly_credit_team_per_seat: 2.00  # per seat, Team/Enterprise
  markup: 0.0                          # HF passes provider costs through, no markup
  doc_url: https://huggingface.co/docs/inference-providers/pricing
supports:
  - chat
  - vision
  - image
  - video
  - audio
  - embeddings
  - tools
  - streaming
  - json_mode
  - reasoning
endpoint: https://router.huggingface.co/v1
# Keine oeffentliche OpenAPI-Spec veroeffentlicht (Stand 07/2026); das Feld wird
# daher weggelassen. Autoritative Live-Modellliste: GET https://router.huggingface.co/v1/models
notes:
  description: "Router/Proxy: ein HF-Token gibt Zugriff auf 17+ Backend-Provider
    (Cerebras, Cohere, DeepInfra, Fal, Fireworks, Groq, Novita, Nscale, OVHcloud,
    Replicate, Scaleway, Together, Z.ai, ...) ohne Vendor-Lock-in."
  openai_compatible: "Drop-in OpenAI-Replace via base_url https://router.huggingface.co/v1,
    ABER nur fuer Chat-Completions. Bild/Video/Audio/Embeddings brauchen die nativen
    SDKs (@huggingface/inference JS bzw. huggingface_hub Python InferenceClient)."
  provider_selection: "Modell-Suffix steuert die Backend-Auswahl:
    :fastest (Default) | :cheapest | :preferred | :<provider> (z.B. :groq)."
  responses_api: "Beta: POST /v1/responses (OpenAI Responses API) mit Tool-Orchestrierung,
    strukturierten Outputs, Remote-MCP-Tools und Reasoning-Effort."
  billing: "X-HF-Bill-To: <org> header fuer Team/Enterprise-Zentralabrechnung;
    alternativ Custom-Provider-Key (dann Provider-seitig abgerechnet, keine HF-Credits)."
  free_tier_detail: "Free = $0.10/Monat Credits (aenderbar), keine Modelle mit $0;
    nach Aufbrauchen Credits zukaufen. is_free ist in /v1/models fuer alle Modelle false."
  failover: "Bei :fastest/auto automatisches Failover auf alternative Provider."
