    CompletionRequest:
      additionalProperties: false
      description: Request for completions endpoint
      examples:
        - model: llama3.1-70b
          prompt: 'Micheael Jordan is born in '
          stream: true
      properties:
        best_of:
          anyOf:
            - maximum: 20.0
              minimum: 0.0
              type: integer
            - type: 'null'
          default: 1
          description: "Generates `best_of` completions server-side and returns the\
            \ \"best\" (the one with the highest log probability per token). Results\
            \ cannot be streamed. When used with `n`, `best_of` controls the number\
            \ of candidate completions and `n` specifies how many to return \u2013\
            \ `best_of` must be greater than `n`. **Note:** Because this parameter\
            \ generates many completions, it can quickly consume your token quota.\
            \ Use carefully and ensure that you have reasonable settings for `max_tokens`\
            \ and `stop`"
          title: Best Of
        echo:
          anyOf:
            - type: boolean
            - type: 'null'
          default: false
          description: Echo back the prompt in addition to the completion
          title: Echo
        frequency_penalty:
          anyOf:
            - maximum: 2.0
              minimum: -2.0
              type: number
            - type: 'null'
          default: 0
          description: Number between -2.0 and 2.0. Positive values penalize new tokens
            based on their existing frequency in the text so far, decreasing the model's
            likelihood to repeat the same line verbatim.
          title: Frequency Penalty
        grammar_root:
          anyOf:
            - type: string
            - type: 'null'
          description: The grammar root used for structured output generation.
          title: Grammar Root
        logit_bias:
          anyOf:
            - additionalProperties:
                type: number
              type: object
            - type: 'null'
          description: "Modify the likelihood of specified tokens appearing in the\
            \ completion.\n \n Accepts a JSON object that maps tokens (specified by\
            \ their token ID in the tokenizer) to an associated bias value from -100\
            \ to 100. Mathematically, the bias is added to the logits generated by\
            \ the model prior to sampling. The exact effect will vary per model, but\
            \ values between -1 and 1 should decrease or increase likelihood of selection;\
            \ values like -100 or 100 should result in a ban or exclusive selection\
            \ of the relevant token."
          title: Logit Bias
        logprobs:
          anyOf:
            - maximum: 20.0
              minimum: 0.0
              type: integer
            - type: 'null'
          description: Include the log probabilities on the logprobs most likely output
            tokens, as well the chosen tokens. For example, if logprobs is 5, the
            API will return a list of the 5 most likely tokens. The API will always
            return the logprob of the sampled token, so there may be up to logprobs+1
            elements in the response.
          title: Logprobs
        max_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          description: 'The maximum number of tokens that can be generated in the
            chat completion. The total length of input tokens and generated tokens
            is limited by the model''s context length. '
          title: Max Tokens
        min_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          description: The minimum number of tokens to generate for a completion.
            If not specified or set to 0, the model will generate as many tokens as
            it deems necessary. Setting to -1 sets to max sequence length.
          title: Min Tokens
        model:
          title: Model
          type: string
        n:
          anyOf:
            - type: integer
            - type: 'null'
          default: 1
          description: How many chat completion choices to generate for each input
            message. Note that you will be charged based on the number of generated
            tokens across all of the choices. Keep n as 1 to minimize costs.
          title: N
        presence_penalty:
          anyOf:
            - maximum: 2.0
              minimum: -2.0
              type: number
            - type: 'null'
          default: 0
          description: Number between -2.0 and 2.0. Positive values penalize new tokens
            based on whether they appear in the text so far, increasing the model's
            likelihood to talk about new topics.
          title: Presence Penalty
        prompt:
          anyOf:
            - type: string
            - items:
                type: string
              type: array
            - items:
                type: integer
              type: array
            - items:
                items:
                  type: integer
                type: array
              type: array
          description: The prompt(s) to generate completions for, encoded as a string,
            array of strings, array of tokens, or array of token arrays.
          title: Prompt
        reasoning_format:
          default: parsed
          description: Determines how reasoning is returned in the response. If set
            to `parsed`, the reasoning will be returned in the `reasoning` field of
            the response message as a string. If set to `raw`, the reasoning will
            be returned in the `content` field of the response message with special
            tokens. If set to `hidden`, the reasoning will not be returned in the
            response.
          enum:
            - none
            - parsed
            - text_parsed
            - raw
            - hidden
          title: Reasoning Format
          type: string
        return_raw_tokens:
          anyOf:
            - type: boolean
            - type: 'null'
          default: false
          description: Return raw tokens instead of text
          title: Return Raw Tokens
        seed:
          anyOf:
            - type: integer
            - type: 'null'
          description: If specified, our system will make a best effort to sample
            deterministically, such that repeated requests with the same `seed` and
            parameters should return the same result. Determinism is not guaranteed.
          title: Seed
        stop:
          anyOf:
            - type: string
            - items:
                type: string
              maxItems: 4
              type: array
            - type: 'null'
          description: Up to 4 sequences where the API will stop generating further
            tokens. The returned text will not contain the stop sequence.
          title: Stop
        stream:
          anyOf:
            - type: boolean
            - type: 'null'
          default: false
          title: Stream
        stream_options:
          anyOf:
            - $ref: '#/components/schemas/StreamOptions'
            - type: 'null'
        suffix:
          anyOf:
            - type: string
            - type: 'null'
          description: The suffix that comes after a completion of inserted text.
            (OpenAI feature, not supported)
          title: Suffix
        temperature:
          anyOf:
            - maximum: 1.5
              minimum: 0.0
              type: number
            - type: 'null'
          default: 1.0
          description: What sampling temperature to use, between 0 and 1.5. Higher
            values like 0.8 will make the output more random, while lower values like
            0.2 will make it more focused and deterministic. We generally recommend
            altering this or `top_p` but not both.
          title: Temperature
        top_p:
          anyOf:
            - maximum: 1.0
              minimum: 0.0
              type: number
            - type: 'null'
          default: 1.0
          description: An alternative to sampling with temperature, called nucleus
            sampling, where the model considers the results of the tokens with top_p
            probability mass. So 0.1 means only the tokens comprising the top 10%
            probability mass are considered. We generally recommend altering this
            or `temperature` but not both.
          title: Top P
        user:
          anyOf:
            - type: string
            - type: 'null'
          description: 'A unique identifier representing your end-user, which can
            help Cerebras to monitor and detect abuse. '
          title: User
      required:
        - model
        - prompt
      title: CompletionRequest
      type: object
    CompletionResponse:
      additionalProperties: true
      examples:
