      type: object
    StreamOptions:
      additionalProperties: true
      description: Options for streaming.
      properties:
        include_usage:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Include Usage
      title: StreamOptions
      type: object
    SupportedParameters:
      description: Sampling parameters supported by the model.
      properties:
        frequency_penalty:
          default: false
          description: Supports frequency_penalty parameter.
          title: Frequency Penalty
          type: boolean
        logit_bias:
          default: false
          description: Supports logit_bias parameter.
          title: Logit Bias
          type: boolean
        logprobs:
          default: false
          description: Supports logprobs output.
          title: Logprobs
          type: boolean
        max_completion_tokens:
          default: true
          description: Supports max_completion_tokens parameter.
          title: Max Completion Tokens
          type: boolean
        presence_penalty:
          default: false
          description: Supports presence_penalty parameter.
          title: Presence Penalty
          type: boolean
        repetition_penalty:
          default: false
          description: Supports repetition_penalty parameter.
          title: Repetition Penalty
          type: boolean
        seed:
          default: true
          description: Supports seed for reproducible outputs.
          title: Seed
          type: boolean
        stop:
          default: true
          description: Supports stop sequences parameter.
          title: Stop
          type: boolean
        temperature:
          default: true
          description: Supports temperature sampling parameter.
          title: Temperature
          type: boolean
        top_logprobs:
          default: false
          description: Supports top_logprobs parameter.
          title: Top Logprobs
          type: boolean
        top_p:
          default: true
          description: Supports top_p (nucleus) sampling parameter.
          title: Top P
          type: boolean
      title: SupportedParameters
      type: object
    SystemMessageRequest:
      additionalProperties: true
      description: A message request from the system.
      properties:
        content:
          anyOf:
            - type: string
            - items:
                discriminator:
                  mapping:
                    image: '#/components/schemas/ImageContent'
                    image_url: '#/components/schemas/ImageUrlContent'
                    text: '#/components/schemas/TextContent'
                  propertyName: type
                oneOf:
                  - $ref: '#/components/schemas/TextContent'
                  - $ref: '#/components/schemas/ImageUrlContent'
                  - $ref: '#/components/schemas/ImageContent'
              type: array
          title: Content
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        role:
          const: system
          default: system
          enum:
            - system
          title: Role
          type: string
      required:
        - content
      title: SystemMessageRequest
      type: object
    TextContent:
      additionalProperties: true
      description: Text content for a message.
      properties:
        text:
          title: Text
          type: string
        type:
          const: text
          enum:
            - text
          title: Type
          type: string
      required:
        - type
        - text
      title: TextContent
      type: object
    TimeInfo:
      additionalProperties: true
      examples:
        - completion_time: 0.44
          prompt_time: 0.02
          queue_time: 0.0
          total_time: 0.46
      properties:
        completion_time:
          default: 0
          minimum: 0.0
          title: Completion Time
          type: number
        prompt_time:
          default: 0
          minimum: 0.0
          title: Prompt Time
          type: number
        queue_time:
          default: 0
          minimum: 0.0
          title: Queue Time
          type: number
        total_time:
          default: 0
          minimum: 0.0
          title: Total Time
          type: number
      title: TimeInfo
      type: object
    Tool:
      additionalProperties: true
      description: A tool object
      properties:
        function:
          $ref: '#/components/schemas/FunctionObject'
        type:
          title: Type
          type: string
      required:
        - type
        - function
      title: Tool
      type: object
    ToolMessageRequest:
      additionalProperties: true
      description: A message request from a tool.
      properties:
        content:
          anyOf:
            - type: string
            - items:
                $ref: '#/components/schemas/TextContent'
              type: array
          title: Content
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        role:
          const: tool
          default: tool
          enum:
            - tool
          title: Role
          type: string
        tool_call_id:
          title: Tool Call Id
          type: string
      required:
        - content
        - tool_call_id
      title: ToolMessageRequest
      type: object
    TopLogProbs:
      additionalProperties: true
      properties:
        bytes:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Bytes
        logprob:
          title: Logprob
          type: number
        token:
          title: Token
          type: string
      required:
        - token
        - logprob
      title: TopLogProbs
      type: object
    Usage:
      additionalProperties: true
      examples:
        - completion_tokens: 1020
          prompt_tokens: 40
          prompt_tokens_details:
            cached_tokens: 1020
          total_tokens: 1060
      properties:
        completion_tokens:
          default: 0
          title: Completion Tokens
          type: integer
        completion_tokens_details:
          anyOf:
            - $ref: '#/components/schemas/CompletionTokensDetails'
            - type: 'null'
        prompt_tokens:
          default: 0
