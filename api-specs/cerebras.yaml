              type: array
            - type: 'null'
          title: Refusal
      required:
        - content
        - refusal
      title: ChatCompletionLogProbs
      type: object
    ChatCompletionRequest:
      additionalProperties: false
      description: Request for chat completions endpoint
      examples:
        - max_completion_tokens: -1
          messages:
            - content: You are a helpful assistant running on a CS-3 hardware at Cerebras
                Systems
              role: system
            - content: What is Generative AI?
              role: user
          min_tokens: 1000
          model: llama3.1-8b
          seed: 0
          stream: false
          temperature: 0
          top_p: 1
      properties:
        clear_thinking:
          anyOf:
            - type: boolean
            - type: 'null'
          description: When True, removes reasoning content from messages that appear
            before the latest user message.
          title: Clear Thinking
        disable_reasoning:
          anyOf:
            - type: boolean
            - type: 'null'
          description: Disables reasoning for reasoning models. If set to True, the
            model will not use any reasoning in its response.
          title: Disable Reasoning
        frequency_penalty:
          anyOf:
            - maximum: 2.0
              minimum: -2.0
              type: number
            - type: 'null'
          default: 0
          description: Number between -2.0 and 2.0. Positive values penalize new tokens
            based on their existing frequency in the text so far, decreasing the model's
            likelihood to repeat the same line verbatim.
          title: Frequency Penalty
        logit_bias:
          anyOf:
            - additionalProperties:
                type: number
              type: object
            - type: 'null'
          description: 'Modify the likelihood of specified tokens appearing in the
            completion.


            Accepts a JSON object that maps tokens (specified by their token ID in
            the tokenizer) to an associated bias value from -100 to 100. Mathematically,
            the bias is added to the logits generated by the model prior to sampling.
            The exact effect will vary per model, but values between -1 and 1 should
            decrease or increase likelihood of selection; values like -100 or 100
            should result in a ban or exclusive selection of the relevant token.'
          title: Logit Bias
        logprobs:
          anyOf:
            - type: boolean
            - type: 'null'
          default: false
          description: Whether to return log probabilities of the output tokens or
            not. If true, returns the log probabilities of each output token returned
            in the content of message.
          title: Logprobs
        max_completion_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          description: An upper bound for the number of tokens that can be generated
            for a completion, including visible output tokens and reasoning tokens.
          title: Max Completion Tokens
        max_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          description: The maximum number of tokens that can be generated in the chat
            completion. The total length of input tokens and generated tokens is limited
            by the model's context length. This value is now deprecated in favor of
            max_completion_tokens.
          title: Max Tokens
        messages:
          anyOf:
            - items:
                discriminator:
                  mapping:
                    assistant: '#/components/schemas/AssistantMessageRequest'
                    system: '#/components/schemas/SystemMessageRequest'
                    tool: '#/components/schemas/ToolMessageRequest'
                    user: '#/components/schemas/UserMessageRequest'
                  propertyName: role
                oneOf:
                  - $ref: '#/components/schemas/SystemMessageRequest'
                  - $ref: '#/components/schemas/UserMessageRequest'
                  - $ref: '#/components/schemas/AssistantMessageRequest'
                  - $ref: '#/components/schemas/ToolMessageRequest'
              type: array
            - type: 'null'
          title: Messages
        min_completion_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          description: The minimum number of tokens to generate for a completion.
            If not specified or set to 0, the model will generate as many tokens as
            it deems necessary. Setting to -1 sets to max sequence length.
          title: Min Completion Tokens
        min_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          description: The minimum number of tokens to generate for a completion.
            If not specified or set to 0, the model will generate as many tokens as
            it deems necessary. Setting to -1 sets to max sequence length.
          title: Min Tokens
        model:
          title: Model
          type: string
        n:
          anyOf:
            - type: integer
            - type: 'null'
          default: 1
          description: How many chat completion choices to generate for each input
            message. Note that you will be charged based on the number of generated
            tokens across all of the choices. Keep n as 1 to minimize costs.
          title: N
        parallel_tool_calls:
          anyOf:
            - type: boolean
            - type: 'null'
          default: true
          title: Parallel Tool Calls
        prediction:
          anyOf:
            - $ref: '#/components/schemas/Prediction'
            - type: 'null'
          description: Configuration for a Predicted Output, which can greatly improve
            response times when large parts of the model response are known ahead
            of time. This is most common when regenerating a file with only minor
            changes to most of the content.
        presence_penalty:
          anyOf:
            - maximum: 2.0
              minimum: -2.0
              type: number
            - type: 'null'
          default: 0
          description: Number between -2.0 and 2.0. Positive values penalize new tokens
            based on whether they appear in the text so far, increasing the model's
            likelihood to talk about new topics.
          title: Presence Penalty
        reasoning_effort:
          anyOf:
            - enum:
                - low
                - medium
                - high
              type: string
            - type: 'null'
          description: Constrains effort on reasoning for reasoning models. Currently
            supported values are low, medium, and high. Reducing reasoning effort
            can result in faster responses and fewer tokens used on reasoning in a
            response. If set to None, the model will use the default reasoning effort
            for the model.
          title: Reasoning Effort
        reasoning_format:
          default: none
          description: Determines how reasoning is returned in the response. If set
            to `parsed`, the reasoning will be returned in the `reasoning` field of
            the response message as a string. If set to `raw`, the reasoning will
            be returned in the `content` field of the response message with special
            tokens. If set to `hidden`, the reasoning will not be returned in the
            response. If set to `none`, the model's default behavior will be used.
            If set to `text_parsed`, the reasoning will be returned in the `reasoning`
            field of the response message as a string, similar to `parsed`, but logprobs
            will not be separated into `reasoning_logprobs` and `logprobs`.
          enum:
            - none
            - parsed
            - text_parsed
            - raw
            - hidden
          title: Reasoning Format
          type: string
        response_format:
          anyOf:
            - discriminator:
                mapping:
                  json_object: '#/components/schemas/ResponseFormatJSONObject'
                  json_schema: '#/components/schemas/ResponseFormatJSONSchema'
                  text: '#/components/schemas/ResponseFormatText'
                propertyName: type
              oneOf:
                - $ref: '#/components/schemas/ResponseFormatText'
                - $ref: '#/components/schemas/ResponseFormatJSONObject'
                - $ref: '#/components/schemas/ResponseFormatJSONSchema'
            - type: 'null'
          title: Response Format
        seed:
          anyOf:
            - type: integer
            - type: 'null'
          description: If specified, our system will make a best effort to sample
            deterministically, such that repeated requests with the same `seed` and
            parameters should return the same result. Determinism is not guaranteed.
          title: Seed
        service_tier:
          anyOf:
            - enum:
                - auto
                - default
                - flex
                - priority
              type: string
            - type: 'null'
          title: Service Tier
        stop:
          anyOf:
            - type: string
            - items:
                type: string
              maxItems: 4
              type: array
            - type: 'null'
          description: Up to 4 sequences where the API will stop generating further
            tokens. The returned text will not contain the stop sequence.
          title: Stop
        stream:
          anyOf:
            - type: boolean
            - type: 'null'
          default: false
          title: Stream
        stream_options:
          anyOf:
            - $ref: '#/components/schemas/StreamOptions'
            - type: 'null'
        temperature:
          anyOf:
            - maximum: 1.5
              minimum: 0.0
              type: number
            - type: 'null'
          default: 1.0
          description: What sampling temperature to use, between 0 and 1.5. Higher
            values like 0.8 will make the output more random, while lower values like
            0.2 will make it more focused and deterministic. We generally recommend
            altering this or `top_p` but not both.
          title: Temperature
        tool_choice:
          anyOf:
            - enum:
                - none
                - auto
                - required
              type: string
            - $ref: '#/components/schemas/ChoiceObject'
            - type: 'null'
          title: Tool Choice
        tools:
          anyOf:
            - items:
                $ref: '#/components/schemas/Tool'
              type: array
            - type: 'null'
          title: Tools
        top_logprobs:
          anyOf:
            - maximum: 20.0
              minimum: 0.0
              type: integer
            - type: 'null'
          description: An integer between 0 and 20 specifying the number of most likely
            tokens to return at each token position, each with an associated log probability.
            logprobs must be set to true if this parameter is used.
          title: Top Logprobs
        top_p:
          anyOf:
            - maximum: 1.0
              minimum: 0.0
              type: number
            - type: 'null'
          default: 1.0
          description: An alternative to sampling with temperature, called nucleus
            sampling, where the model considers the results of the tokens with top_p
            probability mass. So 0.1 means only the tokens comprising the top 10%
            probability mass are considered. We generally recommend altering this
            or `temperature` but not both.
          title: Top P
        user:
          anyOf:
            - type: string
            - type: 'null'
          description: 'A unique identifier representing your end-user, which can
            help Cerebras to monitor and detect abuse. '
          title: User
      required:
        - model
      title: ChatCompletionRequest
      type: object
    ChatCompletionResponse:
      additionalProperties: true
      examples:
        - choices:
            - finish_reason: stop
              index: 0
              message:
                content: "Generative AI is a subfield of artificial intelligence that\
                  \ focuses on generating new, original content, such as images, music,\
                  \ text, or videos. These models are trained on large datasets and\
                  \ learn to recognize patterns, relationships, and structures within\
                  \ the data, allowing them to generate new content that is similar\
                  \ in style, tone, or characteristics to the training data. \n \n\
                  \ Generative AI models can be categorized into two main types: Generative\
                  \ Adversarial Networks (GANs) and Variational Autoencoders (VAEs).\
                  \ GANs consist of two neural networks: a generator and a discriminator.\
                  \ The generator creates new content, while the discriminator evaluates\
                  \ the generated content and tells the generator whether it's realistic\
                  \ or not. VAEs are neural networks that learn to compress and reconstruct\
                  \ data. \n \n Generative AI has numerous applications across various\
                  \ industries, including art and design, content generation, data\
                  \ augmentation, and recommendation systems. Some examples of Generative\
                  \ AI in action include Deep Dream Generator, Amper Music, and DALL-E.\
                  \ \n \n In summary, Generative AI is a powerful technology that\
                  \ enables the creation of new, original content using machine learning\
                  \ models. It has the potential to revolutionize various industries\
                  \ and create new opportunities for artists, designers, and content\
                  \ creators."
                role: assistant
          created: 1721088719
