                  - $ref: '#/components/schemas/ImageContent'
              type: array
          title: Content
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        role:
          const: user
          default: user
          enum:
            - user
          title: Role
          type: string
      required:
        - content
      title: UserMessageRequest
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
        - loc
        - msg
        - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  title: Cerebras Cloud API
  version: 0.2.0
openapi: 3.1.0
paths:
  /public/v1/models:
    get:
      description: List all publicly available models (modelVisibility='PUBLIC' only).
        Use the `format` parameter to get responses compatible with OpenRouter or
        HuggingFace APIs.
      operationId: list_public_models_endpoint_public_v1_models_get
      parameters:
        - description: 'Output format: ''default'' (Cerebras schema), ''openrouter'',
            or ''huggingface'''
          in: query
          name: format
          required: false
          schema:
            allOf:
              - $ref: '#/components/schemas/ModelFormat'
            default: default
            description: 'Output format: ''default'' (Cerebras schema), ''openrouter'',
              or ''huggingface'''
            title: Format
        - in: header
          name: X-Amz-Cf-Id
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: X-Amz-Cf-Id
        - in: header
          name: CF-RAY
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Cf-Ray
      responses:
        '200':
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/PublicModelsListResponse'
                  - $ref: '#/components/schemas/OpenRouterModelsResponse'
                  - $ref: '#/components/schemas/HuggingFaceModelsResponse'
                title: Response List Public Models Endpoint Public V1 Models Get
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List all available models
      tags:
        - Public Models
  /public/v1/models/{model_id}:
    get:
      description: 'Retrieve a specific PUBLIC model by ID (no auth required).


        Security: Only returns the model if modelVisibility=''PUBLIC''.

        Returns 404 if model doesn''t exist or is HIDDEN.'
      operationId: get_public_model_public_v1_models__model_id__get
      parameters:
        - in: path
          name: model_id
          required: true
          schema:
            title: Model Id
            type: string
        - in: header
          name: X-Amz-Cf-Id
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: X-Amz-Cf-Id
        - in: header
          name: CF-RAY
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Cf-Ray
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicModel'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Retrieve a specific model
      tags:
        - Public Models
  /v1/chat/completions:
    post:
      operationId: chat_v1_chat_completions_post
      parameters:
        - in: header
          name: X-Amz-Cf-Id
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: X-Amz-Cf-Id
        - in: header
          name: CF-RAY
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Cf-Ray
        - in: header
          name: X-delay-time
          required: false
          schema:
            anyOf:
              - type: number
              - type: 'null'
            title: X-Delay-Time
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatCompletionResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
        - HTTPBearer: []
      summary: Chat
  /v1/completions:
    post:
      operationId: completions_v1_completions_post
      parameters:
        - in: header
          name: X-Amz-Cf-Id
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: X-Amz-Cf-Id
        - in: header
          name: CF-RAY
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Cf-Ray
        - in: header
          name: X-delay-time
          required: false
          schema:
            anyOf:
              - type: number
              - type: 'null'
            title: X-Delay-Time
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCompletionResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
        - HTTPBearer: []
      summary: Completions
  /v1/models:
    get:
      operationId: list_models_v1_models_get
      parameters:
        - in: header
          name: X-Amz-Cf-Id
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: X-Amz-Cf-Id
        - in: header
          name: CF-RAY
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Cf-Ray
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelMetadataList'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
        - HTTPBearer: []
      summary: List Models
  /v1/models/{model_id}:
    get:
      operationId: get_model_v1_models__model_id__get
      parameters:
        - in: path
          name: model_id
          required: true
          schema:
            title: Model Id
            type: string
        - in: header
          name: X-Amz-Cf-Id
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: X-Amz-Cf-Id
        - in: header
          name: CF-RAY
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Cf-Ray
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelMetadata'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
        - HTTPBearer: []
      summary: Get Model
  /v1/tcp_warming:
    get:
      operationId: tcp_warming_v1_tcp_warming_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Tcp Warming
security:
  - HTTPBearer: []


