components:
  schemas:
    AssistantMessageRequest:
      additionalProperties: true
      description: A message request from an assistant.
      properties:
        content:
          anyOf:
            - type: string
            - items:
                $ref: '#/components/schemas/TextContent'
              type: array
            - type: 'null'
          title: Content
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
        reasoning:
          anyOf:
            - type: string
            - items:
                $ref: '#/components/schemas/TextContent'
              type: array
            - type: 'null'
          title: Reasoning
        role:
          const: assistant
          default: assistant
          enum:
            - assistant
          title: Role
          type: string
        tool_calls:
          anyOf:
            - items:
                $ref: '#/components/schemas/AssistantToolCall'
              type: array
            - type: 'null'
          title: Tool Calls
      title: AssistantMessageRequest
      type: object
    AssistantToolCall:
      additionalProperties: true
