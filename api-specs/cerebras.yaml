          title: Top Logprobs
          type: boolean
        top_p:
          default: true
          title: Top P
          type: boolean
      title: OpenRouterSupportedParameters
      type: object
    Parameters:
      description: 'Represents the parameters a function accepts.

        This model is designed to be flexible to accommodate any JSON Schema.

        The key-value pairs you provide will define the parameters.'
      title: Parameters
      type: object
    Prediction:
      additionalProperties: true
      properties:
        content:
          anyOf:
            - type: string
            - items:
                $ref: '#/components/schemas/TextContent'
              type: array
          title: Content
        type:
          const: content
          enum:
            - content
          title: Type
          type: string
      required:
        - type
        - content
      title: Prediction
      type: object
    PromptTokensDetails:
      additionalProperties: true
      examples:
        - cached_tokens: 1020
      properties:
        cached_tokens:
          default: 0
          title: Cached Tokens
          type: integer
      title: PromptTokensDetails
      type: object
    PublicModel:
      description: 'Complete model specification following OpenAI-compatible schema

        with extensions for OpenRouter/HuggingFace compatibility.'
      properties:
        architecture:
          allOf:
            - $ref: '#/components/schemas/ModelArchitecture'
          description: Technical architecture details of the model.
        capabilities:
          allOf:
            - $ref: '#/components/schemas/ModelCapabilities'
          description: The capabilities supported by the model.
        created:
          description: The Unix timestamp (in seconds) when the model was created.
          minimum: 0.0
          title: Created
          type: integer
        datacenter_locations:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          description: List of datacenter locations where this model is deployed (e.g.,
            ['us-east-1', 'eu-west-1']). May be null if location information is unavailable.
          title: Datacenter Locations
        deprecated:
          default: false
          description: Indicates if the model is deprecated and should not be used
            for new applications.
          title: Deprecated
          type: boolean
        description:
          description: A brief description of the model.
          maxLength: 1000
          minLength: 1
          title: Description
          type: string
        hugging_face_id:
          anyOf:
            - type: string
            - type: 'null'
          description: The corresponding HuggingFace Hub model ID, if available (e.g.,
            'meta-llama/Llama-3.1-8B-Instruct').
          title: Hugging Face Id
        id:
          description: The unique identifier for the model (e.g., 'llama3.1-8b').
          maxLength: 200
          minLength: 1
          title: Id
          type: string
        limits:
          allOf:
            - $ref: '#/components/schemas/ModelLimits'
          description: Usage limits and constraints for the model.
        name:
          description: The human-readable name of the model.
          minLength: 1
          title: Name
          type: string
        object:
          const: model
          default: model
          description: The object type, which is always 'model'.
          enum:
            - model
          title: Object
          type: string
        owned_by:
          description: The organization that owns or created the model.
          minLength: 1
          title: Owned By
          type: string
        preview:
          default: false
          description: Indicates if the model is in preview or beta status.
          title: Preview
          type: boolean
        pricing:
          allOf:
            - $ref: '#/components/schemas/ModelPricing'
          description: Pricing details for the model.
        quantization:
          anyOf:
            - type: string
            - type: 'null'
          description: Quantization precision (e.g., 'FP16', 'FP16/FP8 (weights only)').
          title: Quantization
        supported_parameters:
          $ref: '#/components/schemas/SupportedParameters'
      required:
        - id
        - created
        - owned_by
        - name
        - description
        - pricing
        - capabilities
        - supported_parameters
        - architecture
        - limits
      title: PublicModel
      type: object
    PublicModelsListResponse:
      description: OpenAI-compatible list of models.
      properties:
        data:
          description: Array of model objects
          items:
            $ref: '#/components/schemas/PublicModel'
          title: Data
          type: array
        object:
          const: list
          default: list
          description: Object type (always 'list')
          enum:
            - list
          title: Object
          type: string
      required:
        - data
      title: PublicModelsListResponse
      type: object
    ResponseFormatJSONObject:
      additionalProperties: true
      description: A response format for a JSON object.
      properties:
        type:
          const: json_object
          enum:
            - json_object
          title: Type
          type: string
      required:
        - type
      title: ResponseFormatJSONObject
      type: object
    ResponseFormatJSONSchema:
      additionalProperties: true
      description: A response format for a JSON schema.
      properties:
