        total_tokens:
          default: 0
          title: Total Tokens
          type: integer
      title: Usage
      type: object
    UserMessageRequest:
      additionalProperties: true
      description: A message request from the user.
      properties:
        content:
          anyOf:
            - type: string
            - items:
                discriminator:
                  mapping:
                    image: '#/components/schemas/ImageContent'
                    image_url: '#/components/schemas/ImageUrlContent'
