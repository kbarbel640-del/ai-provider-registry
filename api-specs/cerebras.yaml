          type: string
        type:
          const: function
          enum:
            - function
          title: Type
          type: string
      required:
        - id
        - type
        - function
      title: AssistantToolCall
      type: object
    AssistantToolCallFunction:
      additionalProperties: true
      description: A function call for an assistant tool.
      properties:
        arguments:
          title: Arguments
          type: string
        name:
          title: Name
          type: string
      required:
