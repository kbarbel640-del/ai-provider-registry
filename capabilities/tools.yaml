description: Supports function/tool calling capabilities.
schema:
  type: object
  properties:
    tools:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
            enum: [function]
          function:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              parameters:
                type: object
    tool_choice:
      type: string
      enum: [auto, none, required]
